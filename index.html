<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f0f2f5;
  --surface: #f8f9fb;
  --card: #ffffff;
  --card2: #f0f2f7;
  --card-front: #ffffff;
  --card-back: #eef1fc;
  --text: #1a1d23;
  --text2: #3d4148;
  --sub: #8b909a;
  --border: #e2e5ea;
  --accent: #3a5bd9;
  --accent-light: #eef1fc;
  --accent2: #22c55e;
  --ok: #16a34a;
  --ok-light: #dcfce7;
  --no: #dc2626;
  --no-light: #fee2e2;
  --shadow: 0 2px 10px rgba(0,0,0,0.06);
  --shadow-card: 0 4px 16px rgba(0,0,0,0.09);
  --shadow-hover: 0 8px 28px rgba(0,0,0,0.13);
  --radius: 14px;
}
body.dark {
  --bg: #13151a;
  --surface: #1c1f26;
  --card: #222630;
  --card2: #292d38;
  --card-front: #2a2f3e;
  --card-back: #1e2340;
  --text: #e8eaf0;
  --text2: #b0b5c0;
  --sub: #636875;
  --border: #2e3240;
  --accent: #5b7af5;
  --accent-light: #1e2340;
  --ok: #4ade80;
  --ok-light: #14291e;
  --no: #f87171;
  --no-light: #2a1515;
  --shadow: 0 2px 10px rgba(0,0,0,0.3);
  --shadow-card: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 28px rgba(0,0,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow);
}
.logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
  margin-right: 4px;
  white-space: nowrap;
}
.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  flex: 1;
}

/* ── Buttons ── */
button {
  padding: 6px 13px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card2);
  color: var(--text2);
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.btn-primary {
  background: var(--accent);
  color: #fff !important;
  border: none;
  font-weight: 600;
}
.btn-primary:hover {
  background: #2d4bc4;
  color: #fff !important;
}
.btn-ok {
  background: var(--ok-light);
  color: var(--ok) !important;
  border-color: transparent;
  font-weight: 700;
  font-size: 14px;
}
.btn-ok:hover { background: var(--ok); color: #fff !important; border-color: transparent; }
.btn-no {
  background: var(--no-light);
  color: var(--no) !important;
  border-color: transparent;
  font-weight: 700;
  font-size: 14px;
}
.btn-no:hover { background: var(--no); color: #fff !important; border-color: transparent; }

input, select {
  padding: 6px 11px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

/* ── Toolbar panel ── */
.toolbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: all 0.25s ease;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
}
.toolbar.open {
  max-height: 600px;
  opacity: 1;
  padding: 14px 20px;
}
.toolbar-row {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  min-width: 52px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--card2);
  border-radius: 10px;
  padding: 3px;
  width: fit-content;
}
.tab {
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--sub);
  transition: all 0.15s;
  border: none;
  background: transparent;
}
.tab:hover { color: var(--text); background: transparent; border: none; }
.tab.active {
  background: var(--card);
  color: var(--text);
  font-weight: 600;
  box-shadow: var(--shadow);
  border: none;
}
.tab.active:hover { background: var(--card); color: var(--text); border: none; }

/* ── Category tabs ── */
#categoryBar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
#categoryBar button {
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 12.5px;
}
#categoryBar button.active-cat {
  background: var(--accent);
  color: #fff !important;
  border-color: transparent;
  font-weight: 600;
}
#categoryBar button.active-cat:hover { background: #2d4bc4; color: #fff !important; }

/* ── Main layout ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px 12px;
  gap: 8px;
  width: 100%;
}

/* ── Panel ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── Nav tabs strip ── */
.nav-strip {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ── Panels container ── */
.panel-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.panel-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

/* ══════════════════════════════
   MEMORY GRID
══════════════════════════════ */
.grid-wrapper {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow: visible;
  padding-top: 4px;
}

.grid {
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  transform-origin: top center;
}
.row {
  display: flex;
  flex-wrap: nowrap;
  justify-content: center;
}

/* Step slot */
.slot {
  width: 180px;
  height: 240px;
  margin: 7px;
  border-radius: 20px;
  border: 1.5px dashed var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
  transition: border-color 0.2s;
}
.slot:has(.card) {
  border-style: solid;
  border-color: var(--border);
  background: transparent;
}

/* Card flip */
.card {
  width: 174px;
  height: 226px;
  perspective: 900px;
  position: relative;
  touch-action: pan-y;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: absolute;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
  border-radius: 16px;
}
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 16px;
  padding: 14px 12px;
  text-align: center;
  backface-visibility: hidden;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.4;
  box-shadow: var(--shadow-card);
  word-break: keep-all;
}
.card-front {
  background: var(--card-front);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.card-back {
  background: var(--card-back);
  color: var(--accent);
  border: 1.5px solid var(--accent-light);
  transform: rotateY(180deg);
  font-size: 17px;
}

/* Action buttons under card */
.btnRow {
  display: flex;
  gap: 7px;
  margin-top: 7px;
}
.btnRow button {
  width: 74px;
  height: 34px;
  padding: 0;
  border-radius: 9px;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Step number label */
.step-label {
  position: absolute;
  top: 7px;
  left: 10px;
  font-size: 10px;
  font-weight: 600;
  color: var(--sub);
  opacity: 0.6;
  pointer-events: none;
}

/* Progress bar on slot */
.slot-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--border);
  border-radius: 0 0 18px 18px;
  overflow: hidden;
}
.slot-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
}

/* ── Stats strip ── */
.stats-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 8px;
  background: var(--card2);
  border: 1px solid var(--border);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text2);
}
.stat-pill .stat-val {
  color: var(--accent);
  font-weight: 700;
}
/* ══════════════════════════════
   확대 학습 오버레이
══════════════════════════════ */
#enlargeOverlay{
  display:none; position:fixed; inset:0; z-index:9000;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
#enlargeOverlay.visible{ display:flex; }
#enlargeBox{
  position:relative; display:flex; flex-direction:column;
  align-items:center; gap:12px; padding:22px 26px 18px;
  background:var(--card); border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  border:1px solid var(--border);
  animation:ePop .2s cubic-bezier(.34,1.4,.64,1);
}
@keyframes ePop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#eMeta{ display:flex; align-items:center; justify-content:space-between; width:100%; }
#eStepBadge{
  padding:3px 10px; border-radius:999px;
  background:var(--accent-light); color:var(--accent);
  font-size:11.5px; font-weight:700;
}
#eMode{
  font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px;
  background:#fef3c7; color:#b45309;
}
#eCloseBtn{
  width:26px; height:26px; border-radius:50%; padding:0;
  background:var(--card2); border:1px solid var(--border);
  font-size:13px; color:var(--sub); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#eCloseBtn:hover{background:var(--no-light);color:var(--no);border-color:transparent;}
#eProgressBar{width:100%;height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
#eProgressFill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}
#eCard{
  width:360px; height:460px; perspective:1000px; cursor:pointer; flex-shrink:0;
}
#eCardInner{
  width:100%; height:100%; position:relative;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d; border-radius:22px;
}
#eCardInner.flipped{transform:rotateY(180deg);}
.eface{
  position:absolute; inset:0; display:flex; flex-direction:column;
  justify-content:center; align-items:center; border-radius:22px;
  padding:28px 24px; text-align:center;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  box-shadow:var(--shadow-card); word-break:keep-all;
}
#eFront{
  background:var(--card-front); color:var(--text);
  border:1.5px solid var(--border); font-size:36px; font-weight:700; line-height:1.35;
}
#eBack{
  background:var(--card-back); color:var(--accent);
  border:1.5px solid var(--accent-light);
  transform:rotateY(180deg); font-size:28px; font-weight:700; line-height:1.4;
}
#eHint{font-size:11px;color:var(--sub);opacity:.6;margin-top:14px;}
#eBtnRow{ display:flex; gap:16px; }
#eBtnRow button{
  width:148px; height:52px; border-radius:14px;
  font-size:22px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
#eCounter{font-size:12px;color:var(--sub);font-weight:600;}

/* ── 드래그 피드백 ── */
#eCard {
  user-select: none;
  touch-action: none;  /* 터치 스크롤 막고 드래그 처리 */
}
#eCard.dragging {
  transition: none !important;
}
#eCard.dragging #eCardInner {
  transition: none !important;
}
#eDragHint {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  font-weight: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.08s;
  z-index: 10;
}
#eDragHint.show-ok {
  background: rgba(22,163,74,0.22);
  color: var(--ok);
  opacity: 1;
  border: 3px solid var(--ok);
}
#eDragHint.show-no {
  background: rgba(220,38,38,0.18);
  color: var(--no);
  opacity: 1;
  border: 3px solid var(--no);
}
/* 드래그 안내 텍스트 */
#eDragGuide {
  font-size: 11px;
  color: var(--sub);
  font-weight: 500;
  opacity: 0.7;
  letter-spacing: 0.02em;
}
</style>
</head>

<body>

<!-- ── Header ── -->
<header>
  <span class="logo">🃏 Memory Card</span>
  <div class="header-actions">
    <button onclick="document.querySelector('.toolbar').classList.toggle('open')">⚙ 설정</button>
    <button onclick="toggleDark()">◐ 테마</button>
    <button onclick="toggleFullscreen()">⛶ 전체화면</button>
  </div>
</header>

<!-- ── Toolbar (collapsible) ── -->
<div class="toolbar" id="toolbar">

  <div class="toolbar-row">
    <span class="toolbar-label">데이터</span>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="file" id="upload" accept=".xlsx" style="display:none">
      <button onclick="document.getElementById('upload').click()">📄 엑셀 불러오기</button>
    </label>
    <button onclick="shuffleToggle()">🔀 랜덤</button>
  </div>

  <div class="toolbar-row">
    <span class="toolbar-label">GitHub</span>
    <button onclick="GitHubSync.syncToGitHub()">⬆ 올리기</button>
    <button onclick="GitHubSync.syncFromGitHub()">⬇ 내려받기</button>
    <button onclick="GitHubSync.clearToken()" style="color:var(--sub);">토큰 초기화</button>
  </div>

  <div class="toolbar-row">
    <span class="toolbar-label">카테고리</span>
    <div id="categoryBar"></div>
    <button onclick="addCategory()">+ 추가</button>
    <button onclick="renameCategory()">이름 변경</button>
    <button onclick="removeCategory()">삭제</button>
  </div>

</div>

<!-- ── Main ── -->
<div class="main">

  <!-- Nav tabs + session controls -->
  <div class="panel-card" style="padding:12px 16px;">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('learn', this)">현재 학습</div>
          <div class="tab" onclick="switchTab('sessions', this)">세션</div>
          <div class="tab" onclick="switchTab('completed', this)">완료 단어</div>
        </div>
        <button id="enlargeBtn" onclick="startEnlargeSession()"
          style="background:var(--accent);color:#fff;border:none;font-weight:700;padding:6px 14px;">
          🔍 확대학습
        </button>
      </div>
      <div class="stats-strip" id="statsStrip">
        <div class="stat-pill">전체 <span class="stat-val" id="statTotal">0</span></div>
        <div class="stat-pill">학습중 <span class="stat-val" id="statActive">0</span></div>
        <div class="stat-pill" style="color:var(--ok);">완료 <span class="stat-val" id="statDone" style="color:var(--ok);">0</span></div>
      </div>
    </div>
  </div>

  <!-- Learn panel -->
  <div id="learn" class="panel active">
    <div class="panel-card" style="margin-bottom:12px;padding:12px 16px;">
      <div class="panel-row">
        <input id="sessionName" placeholder="세션 이름" style="min-width:160px;">
        <button class="btn-primary" onclick="saveSession()">저장</button>
        <span style="font-size:11px;font-weight:600;color:var(--sub);margin-left:8px;">완료 칸 수</span>
        <input id="maxStepInput" type="number" min="1" max="25" value="20"
          style="width:60px;text-align:center;font-weight:700;"
          oninput="applyMaxStep(this.value)" title="학습 완료 기준 칸 수">
        <span style="font-size:11px;color:var(--sub);">칸</span>
      </div>
    </div>
    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- 오늘 복습 세션 알림 패널 -->
  <div id="todayReviewPanel" class="panel-card" style="margin-bottom:8px;padding:12px 16px;display:none;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:700;color:#f97316;">🔔 오늘 복습 예정</span>
      <select id="todaySessionSelect" style="min-width:200px;">
        <option value="">— 세션 선택 —</option>
      </select>
      <button class="btn-primary" style="background:#f97316;border-color:transparent;"
        onclick="loadTodaySession()">바로 학습</button>
    </div>
  </div>

  <!-- Sessions panel -->
  <div id="sessions" class="panel">
    <div class="panel-card">
      <p class="section-label">저장된 세션</p>
      <div class="panel-row">
        <select id="sessionList" style="min-width:180px;"></select>
        <button class="btn-primary" onclick="loadSession()">불러오기</button>
        <button onclick="deleteSession()">삭제</button>
      </div>
      <div class="panel-row" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <span style="font-size:12px;color:var(--sub);font-weight:500;">백업:</span>
        <button onclick="exportBackup()">↓ 내보내기</button>
        <button onclick="document.getElementById('importBackup').click()">↑ 불러오기</button>
        <input type="file" id="importBackup" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <!-- Completed panel -->
  <div id="completed" class="panel">
    <div class="panel-card">
      <p class="section-label">완료 단어</p>
      <div class="panel-row">
        <select id="completedList" style="min-width:180px;"></select>
        <button class="btn-primary" onclick="loadCompletedSession()">학습하기</button>
        <button onclick="deleteCompletedSession()">삭제</button>
      </div>
      <div class="panel-row" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <input id="completedName" placeholder="완료 세션 이름" style="min-width:160px;">
        <button onclick="saveCompletedSession()">저장</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════
   mcPcSync — memorycard ↔ practicecheck 연동
══════════════════════════════════════════ */
const mcPcSync = (function(){
  const PC_AREAS_KEY   = 'pc_areas'
  const PC_REPEATS_KEY = 'pc_repeats'
  const REPEAT_OFFSETS = [1,3,7,30]

  function getAreas(){try{return JSON.parse(localStorage.getItem(PC_AREAS_KEY)||'[]')}catch{return[]}}
  function saveAreas(a){localStorage.setItem(PC_AREAS_KEY,JSON.stringify(a))}
  function getRepeats(){try{return JSON.parse(localStorage.getItem(PC_REPEATS_KEY)||'{}')}catch{return{}}}
  function saveRepeats(r){localStorage.setItem(PC_REPEATS_KEY,JSON.stringify(r))}
  function localDate(d){const dt=d||new Date();return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}

  function ensureArea(catName){
    const areas=getAreas();
    if(!areas.find(a=>a.name===catName)){areas.push({name:catName,habits:[],data:{}});saveAreas(areas);}
  }
  function ensureHabit(catName,sessionName){
    const areas=getAreas();
    let area=areas.find(a=>a.name===catName);
    if(!area){area={name:catName,habits:[],data:{}};areas.push(area);}
    if(!area.habits.find(h=>h.name===sessionName)){area.habits.push({name:sessionName,source:'mc'});saveAreas(areas);}
  }
  function markDone(catName,sessionName){
    const today=new Date(),todayStr=today.toDateString();
    const areas=getAreas();
    let area=areas.find(a=>a.name===catName);
    if(!area){area={name:catName,habits:[],data:{}};areas.push(area);}
    if(!area.habits.find(h=>h.name===sessionName)) area.habits.push({name:sessionName,source:'mc'});
    area.data[sessionName+todayStr]=1;
    saveAreas(areas);
    // 반복 스케줄
    const repeats=getRepeats(),rKey=catName+'::'+sessionName,existing=repeats[rKey];
    if(existing){const base=new Date(existing.baseDate+'T12:00:00');today.setHours(12,0,0,0);if(Math.round(Math.abs(today-base)/86400000)<30)return;}
    const due=REPEAT_OFFSETS.map(d=>{const dt=new Date(today);dt.setDate(dt.getDate()+d);return localDate(dt);});
    repeats[rKey]={baseDate:localDate(today),due};saveRepeats(repeats);
  }
  function checkRepeatToday(catName,sessionName){
    const today=localDate(),rep=getRepeats()[catName+'::'+sessionName];
    return rep?rep.due.includes(today):false;
  }
  /* 오늘 복습 예정 세션 목록 */
  function getTodaySessions(){
    const today=localDate(),repeats=getRepeats(),result=[];
    Object.keys(repeats).forEach(rKey=>{
      const rep=repeats[rKey];
      if(rep.due.includes(today)){const[cat,sess]=rKey.split('::');result.push({cat,sess});}
    });
    return result;
  }
  return{ensureArea,ensureHabit,markDone,checkRepeatToday,getTodaySessions};
})()

function utf8_to_b64(str){return btoa(new Uint8Array(new TextEncoder().encode(str)).reduce((d,b)=>d+String.fromCharCode(b),''));}
function b64_to_utf8(b64){return new TextDecoder().decode(Uint8Array.from(atob(b64),c=>c.charCodeAt(0)));}
function getToken(){let t=localStorage.getItem("GH_TOKEN");if(!t){t=prompt("GitHub Token 입력");if(t)localStorage.setItem("GH_TOKEN",t);}return t;}

async function syncToGitHub(silent=false){
  const token=getToken();if(!token)return;
  try{
    const content=utf8_to_b64(JSON.stringify(collectAllCategoryData(),null,2));
    let sha;const check=await fetch(GH_API,{headers:{Authorization:`Bearer ${token}`}});
    if(check.ok){const j=await check.json();sha=j.sha;}
    const res=await fetch(GH_API,{method:"PUT",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({message:"MemoryPath 백업",content,branch:GITHUB.branch,...(sha?{sha}:{})})});
    if(!silent){ if(res.ok) alert("업로드 완료"); else alert("업로드 실패: "+res.status); }
    else if(!res.ok) throw new Error("업로드 실패: "+res.status);
  }catch(e){ if(!silent) alert("오류: "+e.message); else throw e; }
}
async function syncFromGitHub(){
  const token=getToken();if(!token)return;
  const res=await fetch(GH_API,{headers:{Authorization:`Bearer ${token}`}});
  if(!res.ok)return alert("데이터 없음");

function moveCard(i,step){
  if(step>0){positions[i]++;if(positions[i]>=maxStep){const w=words[i];if(!completedWords.some(c=>c.word===w.word))completedWords.push(w);positions[i]=maxStep;}}
  else positions[i]=0;
  saveState();render();
  // 학습 완료(모든 카드 maxStep 도달)시 pc 세션 항목 체크
  if(words.length && words.every((_,idx)=>positions[idx]>=maxStep)){
    // 현재 세션 이름 찾기 (세션 패널 select에서)
    const sl=document.getElementById("sessionList");
    const sName=sl&&sl.value?sl.value:null;
    if(sName) mcPcSync.markDone(getCurrentCat(), sName);
  }
}

function updateStats(){
  const total=words.length;
  const active=words.filter((_,i)=>positions[i]>0&&positions[i]<maxStep).length;
  const done=completedWords.length;
  document.getElementById("statTotal").textContent=total;
  document.getElementById("statActive").textContent=active;
  document.getElementById("statDone").textContent=done;
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  let stepIndex=0;

  layout.forEach(rc=>{
    const row=document.createElement("div");
    row.className="row";

    for(let i=0;i<rc;i++){
      const slot=document.createElement("div");
      slot.className="slot";

      // step label
      const sl=document.createElement("div");
      sl.className="step-label";
      sl.textContent="Lv "+(stepIndex+1);
      slot.appendChild(sl);

      // progress bar

      const pf=document.createElement("div");

      pf.style.width=((stepIndex+1)/maxStep*100)+"%";
      pb.appendChild(pf);
      slot.appendChild(pb);

      const idx=positions.findIndex(p=>p===stepIndex);
      const w=idx!==-1?words[idx]:null;

      if(w){
        const card=document.createElement("div");
        card.className="card";
        const inner=document.createElement("div");
        inner.className="card-inner";

        card.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
        card.addEventListener("touchend",e=>{const diff=e.changedTouches[0].clientX-startX;if(diff>40)moveCard(idx,1);if(diff<-40)moveCard(idx,-1);});

        btnRow.className="btnRow";
        const ok=document.createElement("button");
        ok.textContent="O"; ok.className="btn-ok";
        ok.onclick=e=>{e.stopPropagation();moveCard(idx,1);};

        no.onclick=e=>{e.stopPropagation();moveCard(idx,-1);};
        btnRow.append(ok,no);
        slot.appendChild(btnRow);
      }

      row.appendChild(slot);
      stepIndex++;
    }
    grid.appendChild(row);
  });

  autoScaleGrid();
  updateStats();
}

function autoScaleGrid(){
  const grid=document.querySelector(".grid");
  if(!grid) return;

  // 슬롯 1개 = 180+14 = 194px 가로, 240+14 = 254px 세로 (margin 포함)
  const slotW = 194, slotH = 254;
  const cols = 5, rows = 4;
  const totalW = slotW * cols;
  const totalH = slotH * rows;

  // 사용 가능한 공간: 헤더(52) + 탭바(~62) + 세션행(~56) + 여백
  const headerH = document.querySelector("header").offsetHeight || 52;
  const toolbarH = document.querySelector(".toolbar.open") ? (document.querySelector(".toolbar").offsetHeight||0) : 0;
  const topCardH = document.querySelector(".panel-card")?.offsetHeight || 60;
  const sessionBarH = document.querySelector("#learn .panel-card")?.offsetHeight || 52;
  const usedH = headerH + toolbarH + topCardH + sessionBarH + 48; // 48 = gap + padding

  const availW = window.innerWidth - 24;           // 좌우 여백 최소화
  const availH = window.innerHeight - usedH;

  const scaleW = availW / totalW;
  const scaleH = availH / totalH;
  let scale = Math.min(scaleW, scaleH);
  if(scale < 0.3) scale = 0.3;
  // 상한 제거 — 화면이 크면 카드도 그대로 크게

  grid.style.transform = `scale(${scale})`;
  grid.style.transformOrigin = "top center";

  const wrapper = document.querySelector(".grid-wrapper");
  if(wrapper){
    wrapper.style.height = (totalH * scale) + "px";
    wrapper.style.minHeight = "unset";
  }
}
window.addEventListener("resize",autoScaleGrid);

<script>
/* ══════════════════════════════════════════════
   확대 학습 — 지렁이 이동

   라운드 구성: 높은 슬롯 → ... → 슬롯1 → 모음 카드 1장
   ① 슬롯에 카드 있으면 → O/X (O: 한 칸 위, X: 모음으로)
   ② 슬롯이 비었으면   → 건너뜀
   ③ 마지막에 모음(0)에서 카드 1장 → O/X (O: 슬롯1로)

   라운드 끝 → 다시 같은 순서로 반복
══════════════════════════════════════════════ */

let _eRound   = []  // [{slot}] 이번 라운드 슬롯 목록
let _eRIdx    = 0
let _eTimer   = null

function _eSave(){
  localStorage.setItem('_eS_'+getCurrentCat(),
    JSON.stringify({ round: _eRound, rIdx: _eRIdx }))
}
function _eLoad(){
  try{
    const s = JSON.parse(localStorage.getItem('_eS_'+getCurrentCat())||'null')
    if(s && Array.isArray(s.round) && s.round.length){
      _eRound = s.round; _eRIdx = Math.min(s.rIdx||0, s.round.length-1)
      return true
    }
  }catch(e){}
  return false
}

/* 라운드 빌드: 현재 카드가 있는 슬롯들(높은→낮은) + 모음 1장 */
function _buildRound(){
  const slots = []
  for(let s = maxStep - 1; s >= 1; s--){
    if(positions.some(p => p === s)) slots.push(s)
  }
  // 모음에 카드가 있으면 마지막에 추가 (words 순서 첫 번째)
  const poolIdx = words.findIndex((_,i) => positions[i] === 0)
  if(poolIdx !== -1) slots.push(0)

  _eRound = slots
  _eRIdx  = 0
}

function startEnlargeSession(){
  if(!words.length){ alert("카드가 없습니다."); return }
  if(!_eLoad()) _buildRound()
  if(!_eRound.length){ alert("학습할 카드가 없습니다."); return }
  document.getElementById("enlargeOverlay").classList.add("visible")
  _eStep()
}

function _eStep(){
  clearTimeout(_eTimer)

  // 라운드 소진 → 재빌드
  if(_eRIdx >= _eRound.length){
    _buildRound()
    if(!_eRound.length){ eClose(); return }
  }

  const slot = _eRound[_eRIdx]

  // 모음(0): words 순서로 첫 번째 카드
  let wordIdx
  if(slot === 0){
    wordIdx = words.findIndex((_,i) => positions[i] === 0)
  } else {
    wordIdx = positions.findIndex(p => p === slot)
  }

  // 슬롯 비었으면 건너뜀
  if(wordIdx === -1){ _eRIdx++; _eStep(); return }

  const w = words[wordIdx]
  document.getElementById("eWord").textContent    = w.word
  document.getElementById("eMeaning").textContent = w.meaning

  // 배지
  if(slot === 0){
    document.getElementById("eStepBadge").textContent  = "📖 새 카드"
    document.getElementById("eStepBadge").style.cssText =
      "background:var(--ok-light);color:var(--ok);"
  } else {
    document.getElementById("eStepBadge").textContent  = `Lv ${slot + 1}`
    document.getElementById("eStepBadge").style.cssText =
      "background:var(--accent-light);color:var(--accent);"
  }

  document.getElementById("eCounter").textContent =
    `${_eRIdx + 1} / ${_eRound.length}`
  document.getElementById("eProgressFill").style.width =
    Math.round(slot / maxStep * 100) + "%"
  const ci = document.getElementById("eCardInner")
  ci.style.transition = ""
  ci.style.transform  = ""
  ci.style.opacity    = "1"
  ci.classList.remove("flipped")
}

function eFlip(){
  clearTimeout(_eTimer)
  document.getElementById("eCardInner").classList.toggle("flipped")
}

function eAnswer(step){
  clearTimeout(_eTimer)
  const slot = _eRound[_eRIdx]
  const wordIdx = slot === 0
    ? words.findIndex((_,i) => positions[i] === 0)
    : positions.findIndex(p => p === slot)

  if(wordIdx !== -1) moveCard(wordIdx, step)

  _eRIdx++
  _eSave()
  _eStep()
}

function eClose(){
  clearTimeout(_eTimer)
  _eSave()
  document.getElementById("enlargeOverlay").classList.remove("visible")
}

document.getElementById("enlargeOverlay").addEventListener("click", e=>{
  if(e.target === document.getElementById("enlargeOverlay")) eClose()
})
document.addEventListener("keydown", e=>{
  if(!document.getElementById("enlargeOverlay").classList.contains("visible")) return
  if(e.key === "Escape")                                   { e.preventDefault(); eClose();    return }
  if(e.key === " " || e.key === "ArrowRight")              { e.preventDefault(); eFlip();     return }
  if(e.key === "ArrowUp"   || e.key.toLowerCase() === "o") { e.preventDefault(); eAnswer(1)  }
  if(e.key === "ArrowDown" || e.key.toLowerCase() === "x") { e.preventDefault(); eAnswer(-1) }
})

/* ══ 확대학습 카드 드래그 ══ */
;(function setupECardDrag(){
  const card    = document.getElementById("eCard")
  const inner   = document.getElementById("eCardInner")
  const hint    = document.getElementById("eDragHint")
  const THRESHOLD = 80   // 이 픽셀 이상 드래그하면 판정
  const MAX_ROT   = 18   // 최대 기울기(deg)

  let startX = 0, startY = 0
  let curX   = 0
  let isDragging = false
  let dragMoved  = false   // 실제로 움직였는지 (탭과 드래그 구분)

  function onStart(x, y){
    startX = x; startY = y; curX = 0
    isDragging = true; dragMoved = false
    card.classList.add("dragging")
  }

  function onMove(x, y){
    if(!isDragging) return
    const dx = x - startX
    const dy = y - startY
    // 수직 움직임이 수평보다 크면 스크롤로 간주 → 드래그 취소
    if(!dragMoved && Math.abs(dy) > Math.abs(dx) + 5){ onEnd(false); return }
    if(Math.abs(dx) > 6) dragMoved = true
    curX = dx
    const rot = Math.max(-MAX_ROT, Math.min(MAX_ROT, dx / 6))
    const flippedPrefix = inner.classList.contains("flipped") ? "rotateY(180deg) " : ""
    inner.style.transform = flippedPrefix + `translateX(${dx}px) rotate(${rot}deg)`

    // 힌트 표시
    hint.textContent = dx > 0 ? "O" : "X"
    const pct = Math.min(Math.abs(dx) / THRESHOLD, 1)
    if(Math.abs(dx) > 20){
      hint.className = dx > 0 ? "show-ok" : "show-no"
      hint.style.opacity = String(Math.min(pct * 1.2, 1))
    } else {
      hint.className = ""
      hint.style.opacity = "0"
    }
  }

  function onEnd(doJudge=true){
    if(!isDragging) return
    isDragging = false
    card.classList.remove("dragging")

    // 인라인 transform 완전 제거 → CSS .flipped 클래스가 온전히 적용되도록
    inner.style.transition = ""
    inner.style.transform  = ""
    inner.style.opacity    = "1"
    hint.className = ""; hint.style.opacity = "0"

    if(doJudge && dragMoved && Math.abs(curX) >= THRESHOLD){
      const dir = curX > 0 ? 1 : -1
      dragMoved = false
      eAnswer(dir)
    }
  }

  card.removeAttribute("onclick")
  card.addEventListener("click", e=>{
    if(!dragMoved) eFlip()
    dragMoved = false
  })

  /* Pointer Events (마우스 + 터치 통합) */
  card.addEventListener("pointerdown", e=>{
    // 버튼 클릭은 무시
    if(e.target.closest("button")) return
    card.setPointerCapture(e.pointerId)
    onStart(e.clientX, e.clientY)
  })
  card.addEventListener("pointermove", e=>{
    if(!isDragging) return
    onMove(e.clientX, e.clientY)
  })
  card.addEventListener("pointerup",   e=>onEnd(true))
  card.addEventListener("pointercancel", e=>onEnd(false))
})()
</script>
