<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Check</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--surface:#f8f9fb;--card:#ffffff;--card2:#f0f2f7;--text:#1a1d23;--text2:#3d4148;--sub:#8b909a;--border:#e2e5ea;--accent:#3a5bd9;--accent-light:#eef1fc;--ok:#16a34a;--ok-light:#dcfce7;--shadow:0 2px 10px rgba(0,0,0,0.06);--radius:12px;--today-bg:#fef9c3;--today-text:#854d0e;}
body.dark{--bg:#13151a;--surface:#1c1f26;--card:#222630;--card2:#292d38;--text:#e8eaf0;--text2:#b0b5c0;--sub:#636875;--border:#2e3240;--accent:#5b7af5;--accent-light:#1e2340;--ok:#4ade80;--ok-light:#14291e;--shadow:0 2px 10px rgba(0,0,0,0.3);--today-bg:#2d2507;--today-text:#fbbf24;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;min-height:52px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow);}
.logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;margin-right:6px;white-space:nowrap;}
.header-sep{width:1px;height:20px;background:var(--border);margin:0 2px;}
.header-group{display:flex;gap:6px;flex-wrap:wrap;}
button{padding:6px 13px;border:1px solid var(--border);border-radius:8px;background:var(--card2);color:var(--text2);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn-primary{background:var(--accent);color:#fff!important;border-color:transparent;font-weight:600;}
.btn-primary:hover{background:#2d4bc4;border-color:transparent;}
.btn-danger{background:#fee2e2;color:#dc2626!important;border-color:transparent;}
.btn-danger:hover{background:#dc2626;color:#fff!important;}
input,select{padding:6px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
input[type="date"]{min-width:140px;}
.area-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.area-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:0.07em;margin-right:2px;}
.area-btn{border-radius:999px;padding:5px 14px;font-size:12.5px;}
.area-btn.active{background:var(--accent);color:#fff!important;border-color:transparent;font-weight:600;}
.area-btn.dragging-src{opacity:0.35;pointer-events:none;}
.area-btn.drag-over{outline:2px solid var(--accent);outline-offset:2px;}
.manage-toggle-btn{font-size:12.5px;padding:5px 13px;}
.manage-panel{background:var(--card);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;opacity:0;transition:max-height 0.28s ease,opacity 0.2s ease,padding 0.2s;padding:0 20px;}
.manage-panel.open{max-height:300px;opacity:1;padding:16px 20px;}
.manage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px;}
.manage-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.manage-section-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.manage-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.manage-row+.manage-row{margin-top:7px;}
.container{max-width:1300px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px;}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.section-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.section-title{font-size:13px;font-weight:700;color:var(--text);}
.section-body{padding:0;overflow-x:auto;}
table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;}
th{padding:10px 12px;text-align:center;background:var(--surface);color:var(--sub);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
th:first-child{text-align:left;padding-left:18px;}
td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
td:first-child{text-align:left;padding-left:18px;font-weight:500;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface);}
.today-col{background:var(--today-bg)!important;color:var(--today-text)!important;}
th.today-col{color:var(--today-text)!important;}
td.cycle-cell{cursor:pointer;font-size:13px;font-weight:700;transition:background 0.12s;user-select:none;}
td.cycle-cell:hover{filter:brightness(0.94);}
.repeat-legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:8px 18px;border-top:1px solid var(--border);font-size:11px;}
.rep-badge{padding:2px 8px;border-radius:999px;font-weight:600;font-size:11px;}
#stats td:not(:first-child){font-weight:600;color:var(--accent);}
#stats td:first-child{color:var(--text);font-weight:500;}
.week-nav{margin-left:auto;display:flex;align-items:center;gap:8px;}
.week-nav-btn{width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;flex-shrink:0;}
#weekLabel{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:130px;text-align:center;}
.source-badge{display:inline-block;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:600;margin-right:5px;background:var(--accent-light);color:var(--accent);}
</style>
</head>
<body>
<header>
  <span class="logo">✅ Practice Check</span>
  <div class="header-sep"></div>
  <div class="header-group">
    <button onclick="toggleDark()">&#9680; 테마</button>
    <button onclick="goToday()">오늘</button>
    <input type="date" id="weekPicker">
  </div>
  <div class="header-sep"></div>
  <div class="header-group">
    <button onclick="localBackup()">&#8595; 백업</button>
    <button onclick="document.getElementById('localFile').click()">&#8593; 불러오기</button>
    <input type="file" id="localFile" style="display:none">
  </div>
  <div class="header-sep"></div>
  <div class="header-group">
    <button onclick="GitHubSync.upload()">&#11014; GitHub</button>
    <button onclick="GitHubSync.download()">&#11015; GitHub</button>
    <button onclick="GitHubSync.clear()" style="color:var(--sub);">토큰초기화</button>
  </div>
</header>
<div class="area-bar">
  <span class="area-label">카테고리</span>
  <div id="areaButtons" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;"></div>
  <button class="area-btn" onclick="addArea()">+ 추가</button>
  <button class="area-btn" onclick="renameArea()">이름변경</button>
  <button class="area-btn btn-danger" onclick="deleteArea()">삭제</button>
  <div style="margin-left:auto;">
    <button class="manage-toggle-btn" onclick="document.querySelector('.manage-panel').classList.toggle('open')">&#9881; 관리</button>
  </div>
</div>
<div class="manage-panel">
  <div class="manage-grid">
    <div class="manage-section">
      <div class="manage-section-title">항목</div>
      <div class="manage-row">
        <select id="habitSelect" style="flex:1;min-width:100px;"></select>
        <input id="habitName" placeholder="항목 이름" style="flex:1;min-width:100px;">
      </div>
      <div class="manage-row">
        <button class="btn-primary" onclick="addHabit()">추가</button>
        <button onclick="updateHabit()">수정</button>
        <button class="btn-danger" onclick="deleteHabit()">삭제</button>
      </div>
    </div>
  </div>
</div>
<div class="container">
  <div class="section-card">
    <div class="section-header">
      <span class="section-title">&#128197; 주간 기록</span>
      <div class="week-nav">
        <button class="week-nav-btn" onclick="prevWeek()">&#9664;</button>
        <span id="weekLabel"></span>
        <button class="week-nav-btn" onclick="nextWeek()">&#9654;</button>
      </div>
    </div>
    <div class="section-body"><table id="table"></table></div>
    <div class="repeat-legend">
      <span style="font-size:11px;font-weight:600;color:var(--sub);">반복 주기:</span>
      <span class="rep-badge" style="background:#f97316;color:#fff;">D+1</span>
      <span class="rep-badge" style="background:#f59e0b;color:#000;">D+3</span>
      <span class="rep-badge" style="background:#3b82f6;color:#fff;">D+7</span>
      <span class="rep-badge" style="background:#22c55e;color:#fff;">D+30</span>
      <span class="rep-badge" style="background:#ef4444;color:#fff;">미복습</span>
      <span class="rep-badge" style="background:#dcfce7;color:#16a34a;border:1px solid #86efac;">&#10003; 완료</span>
    </div>
  </div>
  <div class="section-card">
    <div class="section-header"><span class="section-title">&#128202; 통계</span></div>
    <div class="section-body"><table id="stats"></table></div>
  </div>
</div>
<script>
const PC_AREAS_KEY='pc_areas',PC_REPEATS_KEY='pc_repeats';
const REPEAT_OFFSETS=[1,3,7,30];
const REPEAT_COLORS=[{bg:'#f97316',text:'#fff',label:'D+1'},{bg:'#f59e0b',text:'#000',label:'D+3'},{bg:'#3b82f6',text:'#fff',label:'D+7'},{bg:'#22c55e',text:'#fff',label:'D+30'}];
function pcLocalDateStr(d){const dt=d||new Date();return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function pcGetRepeats(){try{return JSON.parse(localStorage.getItem(PC_REPEATS_KEY)||'{}')}catch{return {}}}
function pcSaveRepeats(r){localStorage.setItem(PC_REPEATS_KEY,JSON.stringify(r));}
function pcSetRepeat(areaName,habitName,todayDate){
  const today=todayDate?new Date(todayDate):new Date();
  const todayStr=pcLocalDateStr(today);
  const repeats=pcGetRepeats(),rKey=areaName+'::'+habitName,existing=repeats[rKey];
  if(existing){const base=new Date(existing.baseDate+'T12:00:00');today.setHours(12,0,0,0);const diff=Math.round(Math.abs(today-base)/86400000);if(diff<30)return false;}
  const due=REPEAT_OFFSETS.map(d=>{const dt=new Date(today);dt.setDate(dt.getDate()+d);return pcLocalDateStr(dt);});
  repeats[rKey]={baseDate:todayStr,due};pcSaveRepeats(repeats);return true;
}
function pcGetRepeatInfo(areaName,habitName,dateStr){
  const today=pcLocalDateStr(),rep=pcGetRepeats()[areaName+'::'+habitName];
  if(!rep)return null;
  const idx=rep.due.indexOf(dateStr);if(idx<0)return null;
  if(dateStr<today)return{bg:'#ef4444',text:'#fff',label:'미복습'};
  return Object.assign({},REPEAT_COLORS[idx]);
}
let areas,currentAreaIndex;
function initData(){
  const raw=localStorage.getItem(PC_AREAS_KEY);
  if(raw){areas=JSON.parse(raw);}
  else{
    const old=JSON.parse(localStorage.getItem('areas')||'[]');
    if(old.length){areas=old.map(a=>({name:a.name,habits:(a.habits||[]).map(h=>({name:h.name,source:'manual'})),data:a.data||{}}));}
    else{areas=[{name:'기본',habits:[],data:{}}];}
    localStorage.setItem(PC_AREAS_KEY,JSON.stringify(areas));
  }
  currentAreaIndex=parseInt(localStorage.getItem('pc_areaIdx')||'0');
  if(currentAreaIndex>=areas.length)currentAreaIndex=0;
}
function getArea(){return areas[currentAreaIndex];}
function save(){localStorage.setItem(PC_AREAS_KEY,JSON.stringify(areas));localStorage.setItem('pc_areaIdx',String(currentAreaIndex));}
function renderAreaBar(){
  const wrap=document.getElementById('areaButtons');
  wrap.innerHTML='';
  areas.forEach((a,i)=>{
    const b=document.createElement('button');
    b.textContent=a.name;
    b.className='area-btn'+(i===currentAreaIndex?' active':'');
    b.draggable=true;
    b.dataset.idx=i;
    b.style.cursor='grab';

    // 클릭으로 전환
    b.onclick=()=>{currentAreaIndex=i;render();};

    // ── 드래그 이벤트 ──
    b.addEventListener('dragstart',e=>{
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',i);
      setTimeout(()=>b.classList.add('dragging-src'),0);
    });
    b.addEventListener('dragend',()=>{
      b.classList.remove('dragging-src');
      wrap.querySelectorAll('.area-btn').forEach(el=>el.classList.remove('drag-over'));
    });
    b.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      wrap.querySelectorAll('.area-btn').forEach(el=>el.classList.remove('drag-over'));
      b.classList.add('drag-over');
    });
    b.addEventListener('dragleave',()=>b.classList.remove('drag-over'));
    b.addEventListener('drop',e=>{
      e.preventDefault();
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=parseInt(b.dataset.idx);
      if(from===to)return;
      // 배열 순서 변경
      const moved=areas.splice(from,1)[0];
      areas.splice(to,0,moved);
      // currentAreaIndex 보정
      if(currentAreaIndex===from) currentAreaIndex=to;
      else if(from<to && currentAreaIndex>from && currentAreaIndex<=to) currentAreaIndex--;
      else if(from>to && currentAreaIndex>=to && currentAreaIndex<from) currentAreaIndex++;
      save();render();
    });

    // ── 터치 드래그 (모바일) ──
    let touchSrcIdx=null,ghost=null,touchStartX=0,touchStartY=0,isDragging=false;
    b.addEventListener('touchstart',e=>{
      touchSrcIdx=i;
      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
      isDragging=false;
      ghost=null;
    },{passive:true});
    b.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-touchStartX,dy=e.touches[0].clientY-touchStartY;
      if(!isDragging&&Math.sqrt(dx*dx+dy*dy)>10){
        isDragging=true;
        ghost=b.cloneNode(true);
        ghost.style.cssText='position:fixed;z-index:9999;opacity:0.75;pointer-events:none;border-radius:999px;padding:5px 14px;font-size:12.5px;background:var(--accent);color:#fff;border:none;font-family:inherit;';
        document.body.appendChild(ghost);
        b.classList.add('dragging-src');
      }
      if(isDragging){
        if(ghost){ghost.style.left=(e.touches[0].clientX-30)+'px';ghost.style.top=(e.touches[0].clientY-18)+'px';}
        const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
        wrap.querySelectorAll('.area-btn').forEach(el=>el.classList.remove('drag-over'));
        if(el&&el.classList.contains('area-btn')&&el!==b) el.classList.add('drag-over');
      }
    },{passive:true});
    b.addEventListener('touchend',e=>{
      if(ghost){ghost.remove();ghost=null;}
      b.classList.remove('dragging-src');
      wrap.querySelectorAll('.area-btn').forEach(el=>el.classList.remove('drag-over'));
      if(!isDragging){
        // 단순 탭 → 카테고리 전환
        currentAreaIndex=i;render();
      } else {
        // 드래그 완료 → 순서 변경
        const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
        if(el&&el.classList.contains('area-btn')&&touchSrcIdx!==null){
          const to=parseInt(el.dataset.idx),from=touchSrcIdx;
          if(from!==to){
            const moved=areas.splice(from,1)[0];
            areas.splice(to,0,moved);
            if(currentAreaIndex===from) currentAreaIndex=to;
            else if(from<to&&currentAreaIndex>from&&currentAreaIndex<=to) currentAreaIndex--;
            else if(from>to&&currentAreaIndex>=to&&currentAreaIndex<from) currentAreaIndex++;
            save();render();
          }
        }
      }
      touchSrcIdx=null;isDragging=false;
    });

    wrap.appendChild(b);
  });
}
function addArea(){const name=prompt('카테고리 이름');if(!name)return;areas.push({name,habits:[],data:{}});currentAreaIndex=areas.length-1;save();render();}
function renameArea(){const name=prompt('새 이름',getArea().name);if(!name)return;getArea().name=name;save();render();}
function deleteArea(){if(areas.length===1)return alert('최소 1개 필요');areas.splice(currentAreaIndex,1);currentAreaIndex=0;save();render();}
function renderHabitSelect(){document.getElementById('habitSelect').innerHTML=getArea().habits.map((h,i)=>'<option value="'+i+'">'+h.name+'</option>').join('');}
function addHabit(){const name=document.getElementById('habitName').value.trim();if(!name)return;getArea().habits.push({name,source:'manual'});save();render();}
function updateHabit(){const idx=document.getElementById('habitSelect').value,name=document.getElementById('habitName').value.trim();if(!name)return;getArea().habits[idx].name=name;save();render();}
function deleteHabit(){getArea().habits.splice(document.getElementById('habitSelect').value,1);save();render();}
let currentDate=new Date();
const DAY_LABELS=['월','화','수','목','금','토','일'];
function getWeek(d){const date=new Date(d),day=date.getDay(),diff=date.getDate()-day+(day===0?-6:1);const monday=new Date(date.setDate(diff));return Array.from({length:7},(_,i)=>{const nd=new Date(monday);nd.setDate(monday.getDate()+i);return nd;});}
function goToday(){currentDate=new Date();document.getElementById('weekPicker').valueAsDate=currentDate;render();}
function prevWeek(){currentDate=new Date(currentDate);currentDate.setDate(currentDate.getDate()-7);document.getElementById('weekPicker').valueAsDate=currentDate;render();}
function nextWeek(){currentDate=new Date(currentDate);currentDate.setDate(currentDate.getDate()+7);document.getElementById('weekPicker').valueAsDate=currentDate;render();}
document.getElementById('weekPicker').addEventListener('change',e=>{currentDate=new Date(e.target.value);render();});
let _curHabits=[],_curWeek=[];
function renderTable(){
  const a=getArea(),week=getWeek(currentDate),todayStr=new Date().toDateString();
  _curHabits=a.habits;_curWeek=week;
  const first=week[0],last=week[6];
  document.getElementById('weekLabel').textContent=(first.getMonth()+1)+'월 '+first.getDate()+'일 \u2013 '+(last.getMonth()+1)+'월 '+last.getDate()+'일';
  let html='<thead><tr><th>항목</th>';
  week.forEach((d,i)=>{const isToday=d.toDateString()===todayStr;html+='<th class="'+(isToday?'today-col':'')+'">' +DAY_LABELS[i]+'<br><span style="font-size:10px;font-weight:500;opacity:0.8;">'+(d.getMonth()+1)+'/'+d.getDate()+'</span></th>';});
  html+='</tr></thead><tbody>';
  a.habits.forEach((h,hi)=>{
    const src=h.source==='lm'?'<span class="source-badge">LM</span>':h.source==='mc'?'<span class="source-badge" style="background:#fef3c7;color:#b45309;">MC</span>':'';
    html+='<tr><td>'+src+h.name+'</td>';
    week.forEach((d,di)=>{
      const isToday=d.toDateString()===todayStr,key=h.name+d.toDateString(),done=a.data[key]===1,dStr=pcLocalDateStr(d);
      const rep=done?null:pcGetRepeatInfo(a.name,h.name,dStr);
      let style='',content='',title='';
      if(done){style=isToday?'background:#86efac;color:#15803d;':'background:#dcfce7;color:#16a34a;';content='&#10003;';}
      else if(rep){style='background:'+rep.bg+';color:'+rep.text+';';content=rep.label;title=rep.label;}
      else if(isToday){style='background:var(--today-bg);color:var(--today-text);';}
      html+='<td class="cycle-cell'+(isToday?' today-col':'')+'" onclick="cycle('+hi+','+di+')" style="'+style+'" title="'+title+'">'+content+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody>';
  document.getElementById('table').innerHTML=html;
}
function cycle(habitIdx,dayIdx){
  const a=getArea(),h=_curHabits[habitIdx],day=_curWeek[dayIdx],key=h.name+day.toDateString(),newV=a.data[key]===1?0:1;
  a.data[key]=newV;
  if(newV===1)pcSetRepeat(a.name,h.name,day);
  save();renderTable();renderStats();
}
function renderStats(){
  const a=getArea();
  let html='<thead><tr><th>항목</th><th>완료 횟수</th></tr></thead><tbody>';
  a.habits.forEach(h=>{const count=Object.keys(a.data).filter(k=>k.startsWith(h.name)&&a.data[k]===1).length;html+='<tr><td>'+h.name+'</td><td>'+(count>0?count:"<span style='color:var(--border)'>\u2014</span>")+'</td></tr>';});
  html+='</tbody>';
  document.getElementById('stats').innerHTML=html;
}
function render(){renderAreaBar();renderHabitSelect();renderTable();renderStats();}
window.addEventListener('storage',e=>{
  if(e.key===PC_AREAS_KEY){try{areas=JSON.parse(e.newValue||'[]');}catch{}if(currentAreaIndex>=areas.length)currentAreaIndex=0;render();}
  if(e.key===PC_REPEATS_KEY){renderTable();}
});
function localBackup(){const json=JSON.stringify(areas,null,2);const blob=new Blob(['\uFEFF'+json],{type:'application/json;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='practicecheck_backup.json';a.click();}
document.getElementById('localFile').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{areas=JSON.parse(reader.result.replace(/^\uFEFF/,''));currentAreaIndex=0;save();render();};reader.readAsText(file,'UTF-8');});
const GH={user:'apor76-cmyk',repo:'data',path:'data/practicecheck.json'};
const API='https://api.github.com/repos/'+GH.user+'/'+GH.repo+'/contents/'+GH.path;
function getToken(){let t=localStorage.getItem('GH_TOKEN');if(!t){t=prompt('GitHub Token');if(t)localStorage.setItem('GH_TOKEN',t);}return t;}
function clearToken(){localStorage.removeItem('GH_TOKEN');alert('삭제됨');}
async function upload(silent=false){
  const token=getToken();if(!token)return;
  try{
    const pack={areas,repeats:pcGetRepeats()};
    const bytes=new TextEncoder().encode(JSON.stringify(pack,null,2));
    let binary='';bytes.forEach(b=>binary+=String.fromCharCode(b));
    const content=btoa(binary);let sha=null;
    const check=await fetch(API,{headers:{Authorization:'Bearer '+token}});
    if(check.ok){const j=await check.json();sha=j.sha;}
    const res=await fetch(API,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({message:'backup',content,...(sha?{sha}:{})})});
    if(!silent){if(res.ok)alert('업로드 완료');else alert('업로드 실패: '+res.status);}
    else if(!res.ok)throw new Error('업로드 실패: '+res.status);
  }catch(e){if(!silent)alert('오류: '+e.message);else throw e;}
}
async function download(){
  const token=getToken();if(!token)return;
  const res=await fetch(API,{headers:{Authorization:'Bearer '+token}});
  const j=await res.json();const raw=atob(j.content.replace(/\n/g,''));
  const uint8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)uint8[i]=raw.charCodeAt(i);
  const pack=JSON.parse(new TextDecoder().decode(uint8));
  if(pack.areas){areas=pack.areas;localStorage.setItem(PC_AREAS_KEY,JSON.stringify(areas));}
  if(pack.repeats)localStorage.setItem(PC_REPEATS_KEY,JSON.stringify(pack.repeats));
  currentAreaIndex=0;render();alert('다운로드 완료');
}
window.GitHubSync={upload,download,clear:clearToken};
;(function(){
  const badge=document.createElement('div');
  badge.style.cssText='position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99999;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,0.65);color:#fff;pointer-events:none;opacity:0;transition:opacity 0.4s;white-space:nowrap;';
  document.body.appendChild(badge);
  let timer=null;
  function showBadge(text,color){badge.textContent=text;badge.style.background=color||'#374151';badge.style.opacity='1';clearTimeout(badge._h);badge._h=setTimeout(()=>badge.style.opacity='0',3500);}
  const _orig=localStorage.setItem.bind(localStorage);
  localStorage.setItem=function(key,val){
    _orig(key,val);
    if(!localStorage.getItem('GH_TOKEN'))return;
    if(key===PC_AREAS_KEY||key===PC_REPEATS_KEY){
      clearTimeout(timer);showBadge('\u270f\ufe0f 변경 감지 \u2014 45초 후 자동 저장','#92400e');
      timer=setTimeout(async()=>{showBadge('\u2601\ufe0f 자동 저장 중...','#1d4ed8');try{await upload(true);showBadge('\u2705 자동 저장 완료','#065f46');}catch(e){showBadge('\u274c 자동 저장 실패','#991b1b');}},45000);
    }
  };
})();
